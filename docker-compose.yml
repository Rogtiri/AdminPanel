
services:
  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    restart: unless-stopped
  frontend:
    build:
      context: .
      dockerfile: ./site/Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped

